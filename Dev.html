<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Norwell · Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <style>
  /* ─── TOKENS ────────────────────────────────────────── */
  :root{
    --bg:#eef1f8;
    --surface:rgba(255,255,255,0.72);
    --surface2:rgba(255,255,255,0.5);
    --border:rgba(255,255,255,0.9);
    --border2:rgba(200,210,240,0.55);
    --text:#0d0f1a;
    --text2:#4a4e6a;
    --text3:#8890b0;
    --accent:#0fa3b1;
    --accent2:#c850e0;
    --glow:rgba(15,163,177,0.22);
    --glow2:rgba(200,80,224,0.16);
    --shadow:0 20px 60px rgba(20,30,80,0.14);
    --shadow-sm:0 4px 16px rgba(20,30,80,0.09);
    --r:28px;--r-sm:14px;--r-xs:8px;
    --blur:blur(24px);--blur-sm:blur(12px);
  }
  body.dark{
    --bg:#07070f;
    --surface:rgba(14,14,28,0.8);
    --surface2:rgba(20,20,40,0.62);
    --border:rgba(80,85,160,0.3);
    --border2:rgba(60,65,130,0.26);
    --text:#eef0ff;--text2:#9095c0;--text3:#50537a;
    --accent:#22d4e8;--accent2:#d060f0;
    --glow:rgba(34,212,232,0.14);--glow2:rgba(208,96,240,0.11);
    --shadow:0 20px 60px rgba(0,0,0,0.66);
    --shadow-sm:0 4px 16px rgba(0,0,0,0.46);
  }

  /* ─── WHY YOU'RE LOOKING AT MY CODE? ─────────────────────────────────────────── */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{height:100%;background:#000;}
  body{
    min-height:100%;display:flex;flex-direction:column;
    font-family:'Space Grotesk',sans-serif;
    background:var(--bg);color:var(--text);
    transition:background .5s,color .4s;
    overflow:hidden;position:relative;
  }

  /* ─── EWAN KO BA, MAHAL KABA?──────────────────────────────── */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(circle,var(--text3) 1px,transparent 1px);
    background-size:28px 28px;
    opacity:.18;
    transition:opacity .5s;
  }
  body.dark::before{opacity:.09;}

  /* ─── CANVAS PARTICLES ──────────────────────────────── */
  #particles{position:fixed;inset:0;pointer-events:none;z-index:0;}

  /* ─── AMBIENT BLOBS ─────────────────────────────────── */
  .blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .blob{
    position:absolute;border-radius:50%;
    filter:blur(90px);opacity:.55;
    animation:drift 22s ease-in-out infinite alternate;
  }
  .blob:nth-child(1){width:520px;height:520px;top:-180px;left:-160px;background:radial-gradient(circle,var(--glow),transparent 70%);}
  .blob:nth-child(2){width:420px;height:420px;bottom:-130px;right:-110px;background:radial-gradient(circle,var(--glow2),transparent 70%);animation-duration:18s;animation-delay:-8s;}
  .blob:nth-child(3){width:260px;height:260px;top:38%;left:55%;background:radial-gradient(circle,rgba(247,183,49,.07),transparent 70%);animation-duration:28s;animation-delay:-14s;}
  @keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,28px) scale(1.07);}}

  /* ─── LOADER ────────────────────────────────────────── */
  #loader{
    position:fixed;inset:0;z-index:9999;background:#040408;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;gap:24px;
    transition:opacity .7s,visibility .7s;
  }
  #loader.out{opacity:0;visibility:hidden;pointer-events:none;}
  .ld-ring{
    width:50px;height:50px;border-radius:50%;
    border:2.5px solid transparent;
    border-top-color:#0fa3b1;border-right-color:#c850e0;
    animation:spin 1.1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loader-phrase{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#3a3a5c;font-weight:500;animation:fup .8s ease .3s both;}
  #skip-link{display:none;font-size:11px;color:#ff4466;cursor:pointer;text-decoration:underline;}
  @keyframes fup{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* ─── MAIN LAYOUT ───────────────────────────────────── */
  .stage{
    flex:1;display:flex;justify-content:center;align-items:center;
    padding:20px 16px 0;perspective:1400px;
    position:relative;z-index:1;overflow:hidden;
  }

  /* ─── SIDE PANELS ───────────────────────────────────── */
  /* Hidden on small screens, shown via media query */
  .side-panel{
    display:none;flex-direction:column;gap:10px;
    position:relative;z-index:2;
    animation:fup .7s ease both;
  }
  .side-panel.left{margin-right:18px;animation-delay:.2s;align-items:flex-end;}
  .side-panel.right{margin-left:18px;animation-delay:.35s;align-items:flex-start;}

  @media(min-width:720px){
    .side-panel{display:flex;}
  }

  /* Glass chip / widget */
  .chip{
    background:var(--surface);
    backdrop-filter:var(--blur-sm);
    border:1px solid var(--border2);
    border-radius:var(--r-sm);
    padding:11px 14px;
    box-shadow:var(--shadow-sm);
    min-width:130px;max-width:145px;
    transition:border-color .25s,transform .25s;
    cursor:default;
  }
  .chip:hover{border-color:var(--accent);transform:translateY(-2px);}
  .chip-label{
    font-size:9px;font-weight:600;letter-spacing:1.2px;
    text-transform:uppercase;color:var(--text3);margin-bottom:5px;
  }
  .chip-val{
    font-family:'Syne',sans-serif;font-weight:700;font-size:18px;
    background:linear-gradient(130deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    line-height:1.1;
  }
  .chip-sub{font-size:10px;color:var(--text3);margin-top:3px;}

  /* Skills/tag chip */
  .tag-chip{
    background:var(--surface);
    backdrop-filter:var(--blur-sm);
    border:1px solid var(--border2);
    border-radius:var(--r-sm);
    padding:11px 14px;
    box-shadow:var(--shadow-sm);
    min-width:130px;max-width:145px;
    transition:border-color .25s,transform .25s;
  }
  .tag-chip:hover{border-color:var(--accent2);transform:translateY(-2px);}
  .tag-chip-title{
    font-size:9px;font-weight:600;letter-spacing:1.2px;
    text-transform:uppercase;color:var(--text3);margin-bottom:7px;
  }
  .tags{display:flex;flex-wrap:wrap;gap:5px;}
  .tag{
    font-size:9.5px;font-weight:600;
    padding:3px 8px;border-radius:20px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;letter-spacing:.3px;
    animation:tag-pulse 3s ease-in-out infinite alternate;
  }
  .tag:nth-child(2){animation-delay:.4s;}
  .tag:nth-child(3){animation-delay:.8s;}
  .tag:nth-child(4){animation-delay:1.2s;}
  .tag:nth-child(5){animation-delay:1.6s;}
  @keyframes tag-pulse{from{opacity:.8;}to{opacity:1;box-shadow:0 0 8px var(--glow);}}

  /* Status widget */
  .status-chip{
    background:var(--surface);
    backdrop-filter:var(--blur-sm);
    border:1px solid var(--border2);
    border-radius:var(--r-sm);
    padding:11px 14px;min-width:130px;max-width:145px;
    box-shadow:var(--shadow-sm);
    transition:border-color .25s,transform .25s;
  }
  .status-chip:hover{border-color:var(--accent);transform:translateY(-2px);}
  .status-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
  .s-dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
    background:#2ecc71;box-shadow:0 0 6px #2ecc71;
    animation:sdot 2.2s ease-in-out infinite;
  }
  @keyframes sdot{50%{opacity:.4;transform:scale(1.35);}}
  .s-name{font-size:11px;font-weight:600;color:var(--text);}
  .s-sub{font-size:9.5px;color:var(--text3);}

  /* Mini quote chip */
  .quote-chip{
    background:var(--surface);
    backdrop-filter:var(--blur-sm);
    border:1px solid var(--border2);
    border-radius:var(--r-sm);
    padding:12px 14px;min-width:130px;max-width:145px;
    box-shadow:var(--shadow-sm);
    transition:border-color .25s,transform .25s;
  }
  .quote-chip:hover{border-color:var(--accent2);transform:translateY(-2px);}
  .quote-chip-text{
    font-family:'Pacifico',cursive;font-size:10px;
    color:var(--accent2);line-height:1.5;
  }
  .quote-chip-src{font-size:9px;color:var(--text3);margin-top:5px;font-style:italic;}

  /* ─── CARD SHELL ────────────────────────────────────── */
  .card-shell{width:342px;height:630px;position:relative;flex-shrink:0;}
  .card-inner{
    width:100%;height:100%;
    transform-style:preserve-3d;
    transition:transform .9s cubic-bezier(.35,.1,.15,1);
    position:relative;
  }
  .card-shell.flipped .card-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:var(--r);
  }

  /* ─── FRONT ─────────────────────────────────────────── */
  .face-front{
    background:var(--surface);backdrop-filter:var(--blur);
    -webkit-backdrop-filter:var(--blur);
    border:1px solid var(--border);
    box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.45);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .cover{position:relative;width:100%;height:140px;flex-shrink:0;}
  .cover img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none;}
  .cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,var(--surface) 100%);pointer-events:none;}
  .inf-wrap{position:absolute;top:13px;left:13px;z-index:5;width:64px;height:32px;}
  .inf-path{fill:none;stroke-linecap:round;stroke-width:18;stroke:url(#inf-grad);stroke-dasharray:1000;stroke-dashoffset:1000;animation:draw-inf 5s linear forwards;}
  @keyframes draw-inf{to{stroke-dashoffset:0;}}
  .menu-btn{
    position:absolute;top:13px;right:13px;z-index:6;width:33px;height:33px;
    background:var(--surface2);backdrop-filter:var(--blur-sm);
    border:1px solid var(--border);border-radius:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow-sm);
  }
  .menu-btn:hover{transform:scale(1.07);box-shadow:var(--shadow);}
  .menu-btn svg rect{fill:var(--text);transition:fill .4s;}
  .spark-wrap{position:absolute;top:0;right:0;width:46px;height:46px;pointer-events:none;transition:opacity .3s;}
  .spark-wrap.off{opacity:0;}
  .spark-dot{
    position:absolute;top:9px;right:9px;width:5px;height:5px;
    background:gold;border-radius:50%;
    box-shadow:0 0 4px gold,0 0 8px gold;animation:spk 1.5s ease-in-out infinite;
  }
  .spark-dot::before,.spark-dot::after{content:'';position:absolute;background:gold;box-shadow:0 0 3px gold;}
  .spark-dot::before{width:150%;height:18%;top:41%;left:-25%;}
  .spark-dot::after{width:150%;height:18%;top:41%;left:-25%;transform:rotate(90deg);}
  @keyframes spk{0%,100%{transform:scale(.85) rotate(0deg);opacity:.9;}50%{transform:scale(1.1) rotate(180deg);opacity:1;}}

  .avatar{position:absolute;left:50%;top:140px;transform:translate(-50%,-50%);z-index:5;width:98px;height:98px;}
  .avatar::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--accent),var(--accent2),var(--accent));animation:spin 3.5s linear infinite;}
  .avatar img{position:relative;z-index:1;width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);object-fit:cover;pointer-events:none;user-select:none;-webkit-user-drag:none;}

  .card-body{flex:1;display:flex;flex-direction:column;padding:54px 20px 52px;}
  .name-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:3px;}
  .name-text{
    font-family:'Syne',sans-serif;font-weight:800;font-size:19px;
    background:linear-gradient(130deg,var(--accent) 0%,var(--accent2) 55%,var(--accent) 100%);
    background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:nsh 8s ease infinite;
  }
  @keyframes nsh{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
  .badge{width:17px;height:17px;flex-shrink:0;}
  .bio{font-family:'Pacifico',cursive;font-size:12px;color:var(--accent2);text-align:center;min-height:46px;line-height:1.6;padding:0 6px;position:relative;}
  .bio::after{content:'|';animation:blink .7s infinite;margin-left:2px;font-weight:300;}
  .bio.done::after{display:none;}
  @keyframes blink{50%{opacity:0;}}
  .divider{height:1px;margin:9px 0;background:linear-gradient(90deg,transparent,var(--border2),transparent);}
  .socials{display:flex;justify-content:center;align-items:center;gap:9px;padding:2px 0;}
  .soc{
    width:38px;height:38px;background:var(--surface2);backdrop-filter:var(--blur-sm);
    border:1px solid var(--border2);border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    transition:transform .25s,box-shadow .25s,border-color .25s;
    text-decoration:none;box-shadow:var(--shadow-sm);
  }
  .soc:hover{transform:translateY(-3px) scale(1.07);border-color:var(--accent);box-shadow:0 8px 22px var(--glow);}
  .soc svg{width:20px;height:20px;}

  .info-glass{
    background:var(--surface2);backdrop-filter:var(--blur-sm);
    border:1px solid var(--border2);border-radius:var(--r-sm);
    padding:10px 13px;margin-top:10px;
    display:flex;flex-direction:column;gap:8px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 0 20px var(--glow);
  }
  .ip-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);}
  .idot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#2ecc71;box-shadow:0 0 6px #2ecc71;animation:pdot 2s ease-in-out infinite;}
  .idot.loading{background:#f39c12;box-shadow:0 0 6px #f39c12;}
  .idot.err{background:#e74c3c;box-shadow:0 0 6px #e74c3c;animation:none;}
  @keyframes pdot{50%{opacity:.45;transform:scale(1.35);}}
  #ip-val{margin-left:auto;font-weight:700;color:var(--accent);font-size:11.5px;font-family:'Courier New',monospace;letter-spacing:.3px;}
  .id-clock{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .id-pill{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);position:relative;}
  .id-lbl{font-weight:500;color:var(--text3);font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;}
  #uid-val{font-weight:700;color:var(--text);font-family:'Courier New',monospace;font-size:11.5px;}
  .cpbtn{width:19px;height:19px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;}
  .cpbtn:hover{transform:scale(1.12);}
  .cpbtn svg{width:10px;height:10px;fill:var(--text2);}
  #copy-fb{position:absolute;right:-50px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:var(--accent);opacity:0;transition:opacity .3s;white-space:nowrap;}
  #copy-fb.show{opacity:1;}
  .clock-pill{overflow:hidden;height:21px;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:0 10px;display:flex;align-items:center;justify-content:center;min-width:130px;position:relative;}
  .tslot{position:absolute;font-size:10px;font-weight:600;color:var(--accent);white-space:nowrap;transition:transform .5s cubic-bezier(.18,.89,.32,1.28);transform:translateX(110%);}
  .tslot.in{transform:translateX(0);}
  .tslot.out{transform:translateX(-110%);}

  .act-bar{position:absolute;bottom:13px;right:13px;display:flex;gap:5px;z-index:10;}
  .abt{
    width:30px;height:30px;background:var(--surface2);backdrop-filter:var(--blur-sm);
    border:1px solid var(--border2);border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;cursor:pointer;transition:all .2s;
    box-shadow:var(--shadow-sm);position:relative;user-select:none;
  }
  .abt:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 6px 18px var(--glow);}
  .mpop{
    display:none;position:absolute;bottom:38px;right:0;width:210px;
    background:var(--surface);backdrop-filter:var(--blur);
    border:1px solid var(--border2);border-radius:var(--r-sm);
    padding:13px;box-shadow:var(--shadow);
    font-size:12px;line-height:1.55;text-align:left;color:var(--text2);z-index:20;
  }
  .mpop p{margin-bottom:8px;color:var(--text2);}
  .mpop strong{color:var(--text);}
  .mpop a{color:var(--accent);font-weight:600;text-decoration:none;}
  .mpop a:hover{text-decoration:underline;}
  .plink{display:block;text-align:center;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff!important;padding:7px;border-radius:8px;font-weight:600;font-size:11px;text-decoration:none!important;transition:opacity .2s,transform .2s;margin-top:6px;}
  .plink:hover{opacity:.88;transform:scale(1.02);}

  /* ─── BACK FACE ──────────────────────────────────────── */
  .face-back{transform:rotateY(180deg);border-radius:var(--r);padding:3px;background:linear-gradient(135deg,#0fa3b1,#c850e0,#f7b731,#0fa3b1);background-size:400% 400%;animation:gsh 6s ease infinite;}
  @keyframes gsh{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
  .back-inner{width:100%;height:100%;border-radius:calc(var(--r) - 2px);background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:13px;padding:26px;position:relative;}
  .back-flip{position:absolute;top:13px;right:13px;}
  .scan-lbl{font-family:'Syne',sans-serif;font-weight:800;font-size:12.5px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .qr-wrap{width:245px;height:245px;padding:8px;border-radius:18px;background:var(--surface2);border:1px solid var(--border2);box-shadow:var(--shadow);}
  .qr-wrap img{width:100%;height:100%;border-radius:12px;}
  .qr-date{font-size:9px;color:var(--text3);position:absolute;bottom:56px;left:16px;}
  .link-row{display:flex;align-items:center;gap:7px;width:100%;padding:0 2px;}
  .link-box{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:8px 10px;font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cp-link{width:32px;height:32px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .cp-link:hover{border-color:var(--accent);transform:scale(1.08);}
  .cp-link svg{width:14px;height:14px;fill:var(--text2);}

  <div id="bday-card">
    <div class="bday-x" id="bday-x">✕</div>
    <span class="bday-em">🎂</span>

<script>
/* ── LOADER ── */
const phrases=[
  "Polishing the pixels…","Still faster than Windows update.",
  "Brewing perfection…","Calibrating awesomeness…",
  "It's a feature, not a bug.","Cleaning off the cobwebs…",
  "Loading… you're visitor #2,843,684,714","Never steal — the gov hates competition.",
];
document.getElementById('loader-phrase').textContent=phrases[Math.floor(Math.random()*phrases.length)];
let loaded=false;
function done(){if(loaded)return;loaded=true;clearTimeout(skipT);document.getElementById('loader').classList.add('out');}
window.addEventListener('load',done);
const skipT=setTimeout(()=>{document.getElementById('skip-link').style.display='block';},10000);
document.getElementById('skip-link').addEventListener('click',done);

/* ── PARTICLE CANVAS ── */
(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COUNT=55;
  for(let i=0;i<COUNT;i++){
    pts.push({
      x:Math.random()*2000,y:Math.random()*1200,
      vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
      r:Math.random()*1.8+.4,
      a:Math.random()*.5+.1
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // detect dark
    const dark=document.body.classList.contains('dark');
    const col=dark?'rgba(34,212,232,':'rgba(15,163,177,';
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=col+p.a+')';
      ctx.fill();
    });
    // draw lines between nearby pts
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          const alpha=dark?.06:.04;
          ctx.strokeStyle=col+(alpha*(1-d/110))+')';
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── IP FETCH ── */
const sdot=document.getElementById('status-dot');
const ipEl=document.getElementById('ip-val');
(async()=>{
  const apis=[
    {u:'https://api.ipify.org?format=json',k:'ip'},
    {u:'https://api.my-ip.io/v1/ip.json',k:'ip'},
    {u:'https://ipapi.co/json/',k:'ip'},
  ];
  for(const{u,k}of apis){
    try{
      const r=await fetch(u,{signal:AbortSignal.timeout(5000)});
      if(!r.ok)continue;const d=await r.json();
      if(d[k]){ipEl.textContent=d[k];sdot.classList.remove('loading');return;}
    }catch{}
  }
  ipEl.textContent='Unavailable';
  sdot.classList.remove('loading');sdot.classList.add('err');
})();

/* ── JQUERY ── */
$(document).ready(function(){

  /* Visit counter (localStorage-simulated, resets per browser) */
  let vc=parseInt(localStorage.getItem('vc')||'0')+1;
  localStorage.setItem('vc',vc);
  // animate count up
  let cur=0,target=vc;
  const step=()=>{
    cur=Math.min(cur+Math.ceil(target/30),target);
    $('#visit-count').text(cur.toLocaleString());
    if(cur<target)setTimeout(step,40);
  };step();

  /* Local time chip */
  function updTimeChip(){
    const n=new Date();
    const h=n.getHours()%12||12,mm=String(n.getMinutes()).padStart(2,'0');
    const ap=n.getHours()>=12?'PM':'AM';
    $('#local-time-chip').text(`${h}:${mm} ${ap} local`);
  }
  updTimeChip();setInterval(updTimeChip,60000);

  /* Rotating vibe quotes */
  const vibes=[
    {t:'"Build cool things."',s:'— Norwell'},
    {t:'"Done > perfect."',s:'— Startup wisdom'},
    {t:'"Code. Sleep. Repeat."',s:'— Every dev ever'},
    {t:'"Ship it and iterate."',s:'— The internet'},
    {t:'"Keep it simple."',s:'— Leonardo da Vinci'},
  ];
  let vi=0;
  function rotateVibe(){
    vi=(vi+1)%vibes.length;
    $('#vibe-text').fadeOut(300,function(){$(this).text(vibes[vi].t).fadeIn(300);});
    $('.quote-chip-src').text(vibes[vi].s);
  }
  setInterval(rotateVibe,5000);

  /* Rotating mood */
  const moods=[
    {t:'Building things',s:'and drinking coffee ☕'},
    {t:'Writing code',s:'at 2am probably 🌙'},
    {t:'Learning new stuff',s:'every single day 📚'},
    {t:'Debugging something',s:'it\'s always one line 😅'},
    {t:'Being creative',s:'with a blank canvas 🎨'},
  ];
  let mi=0;
  setInterval(()=>{
    mi=(mi+1)%moods.length;
    $('#mood-text').fadeOut(200,function(){$(this).text(moods[mi].t).fadeIn(200);});
    $('#mood-sub').fadeOut(200,function(){$(this).text(moods[mi].s).fadeIn(200);});
  },4000);

  /* Marquee ticker */
  const tickItems=[
    {em:'👋',t:'Welcome to Norwell\'s profile'},
    {em:'♾️',t:'Built with pure HTML · CSS · JS'},
    {em:'🌐',t:'Hosted on GitHub Pages'},
    {em:'🎨',t:'Glassmorphism + particle canvas'},
    {em:'⚡',t:'Loads fast, looks great'},
    {em:'🔄',t:'Flip the card to scan the QR'},
    {em:'📋',t:'Check the Changelog in the menu'},
    {em:'🎮',t:'There\'s a game in the menu too!'},
    {em:'🌙',t:'Try dark mode — tap the ✦ button'},
    {em:'💡',t:'Every detail was intentional'},
    {em:'🔐',t:'Your IP is fetched client-side only'},
    {em:'🇵🇭',t:'Made in the Philippines · UTC+8'},
  ];
  // duplicate for seamless loop
  const tickerFull=[...tickItems,...tickItems];
  const tickerHtml=tickerFull.map(i=>`<span class="ticker-item"><span class="ti-em">${i.em}</span><span class="ti-dot"></span>${i.t}</span>`).join('');
  $('#ticker-track').html(tickerHtml);

  /* Cover by time */
  const cvrs={morning:'https://i.ibb.co/JjjSZz3g/92ecd75b-96e4-4f7d-a3f0-74e941024352.gif',afternoon:'https://i.ibb.co/ZRd8hPr2/Windmill-GIF.gif',evening:'https://i.ibb.co/wh9YvCRY/Stars-Night-GIF-Find-Share-on-GIPHY.gif'};
  function updCover(){const h=new Date().getHours();$('#cover-photo').attr('src',cvrs[h>=6&&h<12?'morning':h>=12&&h<18?'afternoon':'evening']);}
  updCover();setInterval(updCover,60000);

  /* Theme */
  const MODES=['auto','light','dark'];
  const qf=$('#quote-frame');
  const QL='https://kwize.com/quote-of-the-day/embed/&txt=0d0f1a&font=Space+Grotesk&color=0fa3b1&background=eef1f8';
  const QD='https://kwize.com/quote-of-the-day/embed/&txt=eef0ff&font=Space+Grotesk&color=22d4e8&background=07070f';
  function applyTheme(m){
    const h=new Date().getHours();
    const eff=m==='auto'?(h>=18||h<6?'dark':'light'):m;
    if(eff==='dark'){$('body').addClass('dark').removeClass('light');if(qf.attr('src')!==QD)qf.attr('src',QD);}
    else{$('body').removeClass('dark').addClass('light');if(qf.attr('src')!==QL)qf.attr('src',QL);}
    $('#theme-icon').text(m==='light'?'☀️':m==='dark'?'🌙':'✦');
  }
  $('#theme-btn').on('click',function(e){
    e.stopPropagation();
    const cur=localStorage.getItem('theme')||'auto';
    const nxt=MODES[(MODES.indexOf(cur)+1)%MODES.length];
    localStorage.setItem('theme',nxt);applyTheme(nxt);$('.mpop').hide();
  });
  applyTheme(localStorage.getItem('theme')||'auto');

  /* Bio typewriter */
  const $b=$('#bio'),full=$b.text();
  if(localStorage.getItem('bioSeen')){$b.text(full).addClass('done');}
  else{
    $b.text('');let i=0;
    const iv=setInterval(()=>{if(i<full.length){$b.append(full[i++]);}else{clearInterval(iv);$b.addClass('done');localStorage.setItem('bioSeen','1');}},45);
  }

  /* Unique ID */
  let uid=localStorage.getItem('uid');
  if(!uid){const n=new Date();const mm=String(n.getMonth()+1).padStart(2,'0');const dd=String(n.getDate()).padStart(2,'0');const hh=String(n.getHours()%12||12).padStart(2,'0');const mn=String(n.getMinutes()).padStart(2,'0');uid=`${mm}${dd}-${hh}${mn}`;localStorage.setItem('uid',uid);}
  $('#uid-val').text(uid);

  /* Clock + greeting */
  const $gs=$('#greet-slot'),$cs=$('#clock-slot');
  function greet(h){return h>=5&&h<12?'Good Morning ☀️':h>=12&&h<18?'Good Afternoon 🌤️':'Good Evening 🌙';}
  function tick(){const n=new Date(),h=n.getHours(),ap=h>=12?'PM':'AM';const h12=h%12||12,mm=String(n.getMinutes()).padStart(2,'0'),ss=String(n.getSeconds()).padStart(2,'0');$cs.text(`${h12}:${mm}:${ss} ${ap}`);}
  $gs.text(greet(new Date().getHours())).addClass('in');
  setTimeout(()=>{$gs.removeClass('in').addClass('out');tick();setInterval(tick,1000);setTimeout(()=>$cs.addClass('in'),500);},8000);

  /* Infinity path */
  const p=document.getElementById('inf-path');const L=p.getTotalLength();
  p.style.strokeDasharray=L;p.style.strokeDashoffset=L;
  p.style.animation='draw-inf 5s linear forwards';

  /* Copy */
  function cpText(txt,cb){const ok=()=>cb&&cb();if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(txt).then(ok).catch(()=>fbCp(txt,ok));else fbCp(txt,ok);}
  function fbCp(txt,cb){const t=document.createElement('textarea');t.value=txt;t.style.cssText='position:fixed;top:-9999px';document.body.appendChild(t);t.focus();t.select();try{document.execCommand('copy');cb&&cb();}catch{}document.body.removeChild(t);}
  $('#copy-id-btn').on('click',function(){cpText($('#uid-val').text(),()=>{$('#copy-fb').addClass('show');setTimeout(()=>$('#copy-fb').removeClass('show'),2000);});});
  $('#copy-link-btn').on('click',function(){cpText($('#page-link').text());const $b=$(this);$b.html('✔️');setTimeout(()=>$b.html('<svg viewBox="0 0 24 24" width="14" height="14"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>'),2000);});

  /* Flip */
  let flipping=false;
  $(document).on('click','.flip-trigger',function(){if(flipping)return;flipping=true;if(navigator.vibrate)navigator.vibrate(55);$('#card-shell').toggleClass('flipped');setTimeout(()=>flipping=false,1000);});

  /* Menu */
  const $m=$('#fly-menu'),$sw=$('#spark-wrap');let ma=false;
  function openM(){if(ma||$m.hasClass('open'))return;ma=true;$sw.addClass('off');$m.addClass('open opening').show();$m.one('animationend',()=>{$m.removeClass('opening');ma=false;});}
  function closeM(){if(ma||!$m.hasClass('open'))return;ma=true;$m.addClass('closing');$m.one('animationend',()=>{$m.removeClass('closing open').hide();$sw.removeClass('off');ma=false;});}
  $('#menu-btn').on('click',e=>{e.stopPropagation();$m.hasClass('open')?closeM():openM();});

  /* Micro popups */
  $('#shout-btn,#info-btn').on('click',function(e){e.stopPropagation();const $p=$(this).find('.mpop');const vis=$p.is(':visible');$('.mpop').hide();if(!vis)$p.show();});
  $('.mpop').on('click',e=>e.stopPropagation());

  /* Changelog */
  $('#open-cl').on('click',function(e){e.stopPropagation();closeM();$('#cl-overlay').css('display','flex');});
  $('#cl-close,#cl-overlay').on('click',function(e){if(e.target===this)$('#cl-overlay').fadeOut(250);});

  /* Birthday */
  const n2=new Date();const ph=new Date(n2.getTime()+(n2.getTimezoneOffset()*60000)+3600000*8);
  if(ph.getMonth()===3&&ph.getDate()===20)$('#bday-overlay').css('display','flex');
  $('#bday-x,#bday-overlay').on('click',function(e){if(e.target===this||e.target.id==='bday-x')$('#bday-overlay').fadeOut(250);});

  /* Global close */
  $(document).on('click',function(e){if($m.hasClass('open')&&!$(e.target).closest('#fly-menu,#menu-btn').length)closeM();if(!$(e.target).closest('.abt').length)$('.mpop').hide();});

  localStorage.removeItem('analytics_consent');localStorage.removeItem('last_consent_time');
});
</script>
